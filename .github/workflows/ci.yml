name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Runtime smoke
        shell: bash
        run: |
          npm run start >/tmp/graph-viewer.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid || true' EXIT

          for _ in $(seq 20); do
            curl -sf http://127.0.0.1:3000/ >/dev/null && break
            sleep 1
          done

          curl -si http://127.0.0.1:3000/ | head -n 20 || true
          asset="$(find dist/assets -maxdepth 1 -type f -name '*.js' | head -n1 | xargs basename)"
          if [ -z "$asset" ]; then
            echo "No built asset found in dist/assets" >&2
            exit 1
          fi
          curl -si "http://127.0.0.1:3000/assets/${asset}" | head -n 20 || true
          curl -sI "http://127.0.0.1:3000/assets/${asset}" | grep -i "Cache-Control: public, max-age=31536000, immutable"
